name: Fintech Backend CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: rahulsharma1509/fintech-ai-backend

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Push image
        run: docker push $IMAGE_NAME:${{ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Update deployment
        run: |
          kubectl set image deployment/webhook-service webhook-service=$IMAGE_NAME:${{ github.sha }}
          kubectl rollout status deployment/webhook-service
